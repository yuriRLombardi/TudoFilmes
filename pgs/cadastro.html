<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro | TudoFilmes</title>
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="icon" href="../img/icon.png">
</head>
<body>
    <header>
        <h1>Cadastro | TudoFilmes</h1>
        <a href="../index.php">Voltar ao início</a>
    </header>
    <main>
        <form action="../php/cadastro.php" method="POST">
            <h2>Cadastro</h2>
            

            <label for="senha">Nome</label>
            <div class="input" for="nome">
                <input type="text" name="nome" id="nome" placeholder="Nome Completo" required/>
            </div>
            
            <label for="email">E-mail</label>
            <div class="input" for="email">
                <input type="email" name="email" id="email" placeholder="usuario@dominio.com" required/>
            </div>

            <label for="senha">Senha</label>
            <div class="input" for="senha">
                <input type="password" name="senha" id="senha" placeholder="Password" required style="width:87%"/>
                <img src="../img/eye-on.png" alt="" onclick="mostrarSenha()" width="20px" id="mostraSenha">
                <script>
                    var mostraSenha = document.getElementById("mostraSenha");
                    var senha = document.getElementById("senha");
                    var z = 0;

                    function mostrarSenha() {
                        if(z == 0) {
                            mostraSenha.setAttribute("src", "../img/eye-off.png");
                            senha.setAttribute("type", "text");
                            z++;
                        }else {
                            mostraSenha.setAttribute("src", "../img/eye-on.png");
                            senha.setAttribute("type", "password");
                            z--;
                        }
                    }
                </script>
            </div>

            <label for="confSenha">Confirmar Senha</label>
            <div class="input" for="confSenha">
                <input type="password" name="confSenha" id="confSenha" placeholder="Confirm Password" required style="width:87%"/>
                <img src="../img/eye-on.png" alt="" onclick="mostrarSenha2()" width="20px" id="mostraSenha2">
                <script>
                    var mostraSenha2 = document.getElementById("mostraSenha2");
                    var confSenha = document.getElementById("confSenha");
                    var i = 0;

                    function mostrarSenha2() {
                        if(i == 0) {
                            mostraSenha2.setAttribute("src", "../img/eye-off.png");
                            confSenha.setAttribute("type", "text");
                            i++;
                        }else {
                            mostraSenha2.setAttribute("src", "../img/eye-on.png");
                            confSenha.setAttribute("type", "password");
                            i--;
                        }
                    }
                </script>
            </div>
            
            <label for="dataNasc">Data de Nascimento</label>
            <input type="date" name="dataNasc" id="dataNasc"required/>

            <button type="submit">CADASTRAR</button>
            <p>Já possui conta? Faça <a href="./login.html">login</a> agora mesmo.</p>
        </form>
    </main>
</body>
</html>
